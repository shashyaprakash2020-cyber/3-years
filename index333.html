<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our 3 Years ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
    background: black;
    overflow-y: auto;
}

/* 💌 Content */
.content {
    margin: 100px auto;
    width: 90%;
    max-width: 600px;
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

/* 📸 Center Image */
.main-img {
    width: 100%;
    max-width: 400px;   /* control size */
    height: auto;
    display: block;
    margin: 20px auto;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.main-img:hover {
    transform: scale(1.03);
}

/* ⌨️ Typing text */
#typedText {
    font-size: 18px;
    white-space: pre-line;
}

/* ▶️ Button */
.play-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #ff4d6d;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 20px auto;
    cursor: pointer;
    box-shadow: 0 0 20px #ff4d6d;
    transition: 0.3s;
}

.play-btn:hover {
    transform: scale(1.1);
}

.spin {
    animation: spin 1s linear;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* ❤️ Floating hearts */
.heart {
    position: fixed;
    bottom: -10px;
    color: #ff4d6d;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<audio id="music" src="song.mp3"></audio>

let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("typedText").innerHTML += text.charAt(i);

}
typeWriter();

// ▶️ Music
function playMusic(btn) {
    let music = document.getElementById("music");
    btn.classList.add("spin");

    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }

    setTimeout(() => btn.classList.remove("spin"), 1000);
}

// ❤️ Hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
